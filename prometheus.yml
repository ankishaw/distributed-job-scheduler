global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "job-scheduler"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - scheduler-1:8080
          - scheduler-2:8080
          - worker-3:8080
        labels:
          app: job-scheduler
